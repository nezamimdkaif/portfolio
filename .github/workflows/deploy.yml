name: Deploy Next.js to GitHub Pages

on:
  push:
    # Trigger deployment when code is pushed to your primary branch (main or master)
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build and Export Site
        run: |
          npm run build
          touch out/.nojekyll
        env:
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_KEY }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # Next.js 'output: export' generates pages in the 'out' directory
          branch: gh-pages # The destination branch for GitHub Pages
